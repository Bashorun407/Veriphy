<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .certificate { border: 5px solid #333; padding: 40px; margin: 0 auto; width: 80%; }
        h1 { color: #2c3e50; }
        .qr-code { margin-top: 30px; }
    </style>
</head>
<body>
<div class="certificate">
    <h1>Official Verification Certificate</h1>
    <p>This document is issued to:</p>
    <h2 th:text="${recipientId}">Student ID</h2>

    <p>Document Type: <strong th:text="${documentType}">TYPE</strong></p>
    <p>Issued On: <span th:text="${issuedAt}">DATE</span></p>

    <div class="qr-code">
        <p>Scan to verify authenticity:</p>
        <img th:src="'data:image/png;base64,' + ${qrCodeImage}" width="150" height="150" alt="QR Code"/>
    </div>
</div>
</body>
</html>
